---
layout: base
title: Implicit Surface Rendering Experiment
startscript: App.pages.ImplicitSurfacePage()
header: |
    <style>
        body {
            overflow: hidden;
        }
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 0vh;
            background-color: black;
            transition: height 0.5s;
            background: #212121;
        }
        .bottom-sheet.visible {
            min-height: 200px;
            height: 75vh;
        }

        .view-container {
            width: 100%;
            height: 100vh;
            transition: height 0.5s;
        }

        .view-container.shrunk {
            height: 25vh;
        }
        #editor {
            width: 100%;
            height: calc(75vh - 160px);
            border: 1px solid #303030;
        }
    </style>
---
<div class="view-container">
    <canvas id="view"></canvas>
</div>
<div id="bottom-sheet" class="bottom-sheet mdc-theme--dark">
    <header class="mdc-toolbar" style="background: transparent">
        <div class="mdc-toolbar__row">
            <section class="mdc-toolbar__section mdc-toolbar__section--shrink-to-fit mdc-toolbar__section--align-start">
                <a id="close-bottom-sheet" class="material-icons mdc-toolbar__menu-icon" href="#">arrow_back</a>
            </section>
            <section class="mdc-toolbar__section mdc-toolbar__section--align-end">
                <div>
                    <nav class="mdc-tab-bar mdc-tab-bar--icon-tab-bar">
                        <a class="mdc-tab mdc-tab--active" href="#code" aria-controls="code">
                            <i class="material-icons mdc-tab__icon" aria-label="Recents">code</i>
                        </a>
                        <span class="mdc-tab-bar__indicator"></span>
                    </nav>
                </div>
            </section>
        </div>
    </header>
    <section style="padding: 0 25px 0px 25px">
        <div class="panels mdc-theme--text-primary-on-dark">
            <div id="code" class="panel active">
                <div class="mdc-typography--title">Signed Distance Function</div>
                <p>Edit the signed distance function shader, a GLSL snippet that is used by a ray-sphere-marching algorithm.</p>
                <div id="editor"></div>
            </div>
        </div>
    </section>
</div>
<button id="fab-tune" class="fab-bottom-right mdc-fab material-icons mdc-theme--primary mdc-theme--background" aria-label="Tune" data-mdc-auto-init="MDCRipple">
    <span class="mdc-fab__icon">
        tune
    </span>
</button>
<button id="fab-update" class="fab-bottom-right mdc-fab mdc-fab--exited material-icons mdc-theme--primary mdc-theme--background" aria-label="Update" data-mdc-auto-init="MDCRipple">
    <span class="mdc-fab__icon">
        autorenew
    </span>
</button>
