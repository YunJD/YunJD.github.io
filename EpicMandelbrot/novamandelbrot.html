<textarea id="mandelbrot-shader" class="code-area">
    //This shader is sampled 16 times from the Javascript.

    //Don't be fooled, the precision is still pathetic.
    precision highp float;

    //Don't meddle with these.
    uniform sampler2D mandelbrotTex;

    //No I didn't bother to use a matrix.
    uniform vec2 scale;
    uniform vec2 translate;
    uniform vec2 pxDisp;
    varying vec2 vUv;

    //Map to the proper window extents.
    vec2 coord() 
    {
        float x = vUv.x * 2.0 * scale.x - scale.x;
        float y = vUv.y * 2.0 - 1.0;
        return (vec2(x, y) + pxDisp + translate) * scale.y;
    }

#define ITERATIONS 500
#define LOG2 0.69314718056

    vec2 indexMat4(int index) {
        int row = index / 4;
        int col = index - 4 * row;
        return vec2(row, col); 
    }

    vec3 mandelbrot() 
    {
        vec2 c = coord();
        vec2 z = vec2(1., 0.) + c;
        float iexp = 0.;

        for(int i = 1; i <= ITERATIONS; ++i)
        {
            float x2 = z.x * z.x; 
            float x3 = x2 * z.x;
            
            float y2 = -z.y * z.y; 
            float y3 = y2 * z.y;

            vec2 zn = vec2(
                x3 + 3. * y2 * z.x - 1.,
                y3 + 3. * x2 * z.y
            );

            float zr2 = x2 + y2;
            float zi2 = 2. * z.x * z.y;

            float denom = 3. * (zr2 * zr2 + zi2 * zi2);
 
            zn = z - vec2(
                zn.x * zr2 + zn.y * zi2, 
                zn.y * zr2 - zn.x * zi2
            ) / denom + c;

            float cangle = atan(zn.y, zn.x);

            vec2 diff = zn - z;
            float cabsd = sqrt(diff.x * diff.x + diff.y * diff.y);

            if(cabsd < 1e-6) {
                float ii = float(i) / log(sqrt(cabsd));
                return vec3(
                  cos(ii + 1.) * 0.25 + sin(ii + 2.5) * 0.25 + 0.5,
                  cos(ii + 1.5) * 0.25 + sin(ii + 1.5) * 0.25 + 0.5,
                  cos(ii + 2.2) * 0.25 + sin(ii + 1.) * 0.25 + 0.5
                );
            }
            z = zn;
        }

        return vec3(0.0, 0.0, 0.0);
    }

    void main()
    {
        vec4 color = texture2D(mandelbrotTex, vUv) + vec4(mandelbrot(), 1.);
        gl_FragColor = color;
    }
</textarea>
<textarea id="draw-shader" style="display:none">
    varying vec2 vUv;
    uniform float passes;
    uniform sampler2D mandelbrotTex;

    void main()
    {
        vec4 color = texture2D(mandelbrotTex, vUv);
        color = color / (color.a - 1.);
        gl_FragColor = vec4(vec3(color), 1.0);
    }
</textarea>
