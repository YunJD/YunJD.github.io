<!DOCTYPE html>
<html class="mdc-typography">
    <head>
        <style>.mdc-snackbar { transform: translateY(100%); }</style>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/scripts/css/normalize.css"/>
        <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/scripts/css/css.css"/>
        {{page.header}}
        <title>{{page.title}}</title>
    </head>
    <body class="{{page.pageClass}}">
        {{ content }}
        <div class="mdc-snackbar"
             aria-live="assertive"
             aria-atomic="true"
             aria-hidden="true">
            <div class="mdc-snackbar__text"></div>
            <div class="mdc-snackbar__action-wrapper">
                <button type="button" class="mdc-snackbar__action-button"></button>
            </div>
        </div>
        <script type="text/javascript" src="{{ site.baseurl }}/scripts/js/jquery.min.js"></script>
        <script type="text/javascript" src="{{ site.baseurl }}/scripts/js/ace/ace.js"></script>
        <script type="text/javascript" src="{{ site.baseurl }}/scripts/js/material-components-web.min.js"></script>
        <script type="text/javascript" src="{{ site.baseurl }}/scripts/js/App.js"></script>
        <script type="text/javascript">{{page.startscript}}</script>
    </body>
</html>
